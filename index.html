<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AREA INDIA FOUNDATION</title>

<style>
body {margin:0;font-family:Arial;background:#f5f7fa;}
.navbar {display:flex;align-items:center;padding:15px;background:white;}
.navbar img {width:50px;margin-right:10px;}
.hero {height:90vh;background:#222;color:white;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.btn {background:#ff3b3b;color:white;padding:12px 25px;border-radius:30px;margin:10px;border:none;}
.section {padding:40px;text-align:center;}
.card {background:white;padding:20px;margin:10px;border-radius:10px;display:inline-block;width:260px;}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

</head>

<body>

<div class="navbar">
<h2>AREA INDIA FOUNDATION</h2>
</div>

<div class="hero">
<h1>Support Education ❤️</h1>
<button onclick="startTimer()" class="btn">Start Test</button>
<h3>Total Donation ₹ <span id="donationAmount">0</span></h3>
</div>

<div class="section">
<h2>Mock Test</h2>
<h3>⏱ Time Left: <span id="timer">60</span></h3>

<div id="quiz"></div>
<button class="btn" onclick="submitQuiz()">Submit</button>

<h3 id="result"></h3>

<h2>🏆 Leaderboard</h2>
<div id="leaderboard"></div>
</div>

<script>

// FIREBASE
const firebaseConfig = {
databaseURL: "https://area-india-foundation-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// QUESTIONS
let questions = [
{q:"2+2=?",options:["3","4","5","6"],answer:"4"},
{q:"Capital of India?",options:["Delhi","Mumbai","Kolkata","Chennai"],answer:"Delhi"}
];

// LOAD QUIZ
function loadQuiz(){
let quiz=document.getElementById("quiz");
quiz.innerHTML="";
questions.forEach((q,i)=>{
let html=`<div class="card"><h3>${q.q}</h3>`;
q.options.forEach(opt=>{
html+=`<label><input type="radio" name="q${i}" value="${opt}">${opt}</label><br>`;
});
html+=`</div>`;
quiz.innerHTML+=html;
});
}
loadQuiz();

// TIMER FIX ✅
let time = 60;
let timerInterval;
let submitted = false;

function startTimer(){

if(timerInterval) return;

timerInterval = setInterval(() => {

time--;
document.getElementById("timer").innerText = time;

if (time <= 0) {
clearInterval(timerInterval);
submitQuiz();
alert("Time Up ⏰");
}

}, 1000);
}

// SUBMIT FIX ✅
function submitQuiz(){

if(submitted) return; // ❌ double रोक दिया
submitted = true;

let score=0;

questions.forEach((q,i)=>{
let sel=document.querySelector(`input[name=q${i}]:checked`);
if(sel && sel.value===q.answer) score++;
});

document.getElementById("result").innerText = "Score: "+score;

// PROMPT FIX ✅ (sirf 1 baar)
let name = prompt("Enter Name");
if(name){
db.ref("leaderboard").push({name,score});
}

}

// LEADERBOARD
db.ref("leaderboard").on("value", snap=>{
let data=snap.val() || {};
let html="";

for(let id in data){
html+=`<div class="card">${data[id].name} - ${data[id].score}</div>`;
}

document.getElementById("leaderboard").innerHTML=html;
});

</script>

</body>
</html>
