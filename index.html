<!DOCTYPE html>
<html>
<head>
<title>AREA INDIA FOUNDATION</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{font-family:Arial;text-align:center;background:#111;color:#fff}
button{padding:10px;margin:5px;border:none;border-radius:5px;background:#00ffcc;color:#000;font-weight:bold}
input{padding:8px;margin:5px}
.card{background:#222;padding:15px;margin:10px;border-radius:10px}
</style>
</head>

<body>

<h1>AREA INDIA FOUNDATION ❤️</h1>

<img src="https://i.ibb.co/7QpKsCX/logo.png" width="120">

<h2>Total Donation ₹ <span id="donation">0</span></h2>

<button onclick="donate()">Donate 💰</button>
<button onclick="startTest()">Start Test</button>

<hr>

<!-- LOGIN -->
<div class="card">
<h3>Admin Login 🔐</h3>
<input type="password" id="pass" placeholder="Enter Password">
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
</div>

<!-- MOCK TEST -->
<div class="card">
<h2>Mock Test ⏱</h2>
<div id="quiz"></div>
<p>Time Left: <span id="time">60</span></p>
<button onclick="submitTest()">Submit</button>
</div>

<!-- LEADERBOARD -->
<div class="card">
<h2>Leaderboard 🏆</h2>
<ul id="leaderboard"></ul>
</div>

<!-- ADMIN PANEL -->
<div class="card" id="admin" style="display:none">
<h2>Admin Panel ⚙️</h2>
<button onclick="addQuestion()">Add Question</button>
<button onclick="resetQuiz()">Reset Quiz</button>
</div>

<script>

// 🔥 FIREBASE CONFIG (APNA DAL)
var firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
databaseURL: "https://YOUR_PROJECT.firebaseio.com",
projectId: "YOUR_PROJECT",
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// 🔥 DONATION LIVE UPDATE
db.ref("donations").on("value", snap=>{
document.getElementById("donation").innerText = snap.val() || 0;
});

// 💰 RAZORPAY
function donate(){
let amount = prompt("Enter Amount ₹");

var options = {
"key": "YOUR_RAZORPAY_KEY",
"amount": amount * 100,
"currency": "INR",
"name": "AREA INDIA FOUNDATION",
"description": "Donation",
"handler": function () {
alert("Payment Success ✅");
// ⚠️ BACKEND SE UPDATE HOGA (SECURE)
}
};

new Razorpay(options).open();
}

// 🔐 LOGIN
function login(){
let p = document.getElementById("pass").value;
if(p==="admin123"){
document.getElementById("admin").style.display="block";
alert("Login Success");
}
}

function logout(){
document.getElementById("admin").style.display="none";
}

// 🧠 QUESTIONS
let questions = [
{q:"India capital?",a:"Delhi"},
{q:"2+2?",a:"4"},
{q:"Sun rises from?",a:"East"}
];

let score=0;

// SHOW QUIZ
function loadQuiz(){
let html="";
questions.forEach((q,i)=>{
html+=q.q+"<br><input id='q"+i+"'><br>";
});
document.getElementById("quiz").innerHTML=html;
}
loadQuiz();

// TIMER
let time=60;
setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) submitTest();
},1000);

// SUBMIT
function submitTest(){
score=0;
questions.forEach((q,i)=>{
let ans=document.getElementById("q"+i).value;
if(ans.toLowerCase()==q.a.toLowerCase()) score++;
});

alert("Score: "+score);

// SAVE LEADERBOARD
let name=prompt("Enter Name");
db.ref("leaderboard").push({name,score});
}

// 🏆 LOAD LEADERBOARD
db.ref("leaderboard").on("value",snap=>{
let data=snap.val();
let html="";
for(let id in data){
html+=`<li>${data[id].name} - ${data[id].score}</li>`;
}
document.getElementById("leaderboard").innerHTML=html;
});

// ⚙️ ADMIN
function addQuestion(){
let q=prompt("Question?");
let a=prompt("Answer?");
questions.push({q,a});
loadQuiz();
}

function resetQuiz(){
questions=[];
loadQuiz();
}

</script>

</body>
</html>
