<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Area India Foundation</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  padding:10px;
  background:white;
}

.logo{
  width:50px;
  height:50px;
  border-radius:50%;
  margin-right:10px;
}

.title{
  font-size:22px;
  font-weight:bold;
  color:#1565c0;
}

/* HERO */
.hero{
  position:relative;
  height:300px;
  background:url('https://images.unsplash.com/photo-1529156069898-49953e39b3ac') no-repeat center/cover;
  color:white;
  text-align:center;
}

.hero h1{
  padding-top:80px;
}

.donate-btn{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  background:red;
  color:white;
  border-radius:25px;
  font-size:16px;
  cursor:pointer;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.1)}
  100%{transform:scale(1)}
}

/* CARDS */
.section{
  padding:20px;
  text-align:center;
}

.card{
  background:white;
  padding:15px;
  margin:10px;
  border-radius:15px;
  display:flex;
  align-items:center;
  gap:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
  width:40px;
  height:40px;
}

/* MOCK TEST */
.test-box{
  background:white;
  padding:15px;
  margin:15px;
  border-radius:10px;
}

.timer{
  color:red;
  font-weight:bold;
}

button{
  padding:10px 20px;
  background:#1565c0;
  color:white;
  border:none;
  border-radius:5px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="logo">
  <div class="title">AREA INDIA FOUNDATION</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Support Education ❤️</h1>
  <p>Research | Educate | Empower</p>
  <button class="donate-btn" onclick="pay()">Donate via UPI 💰</button>
</div>

<!-- WHAT WE DO -->
<div class="section">
  <h2>What We Do</h2>

  <div class="card">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
    <div>Education Support</div>
  </div>

  <div class="card">
    <img src="https://cdn-icons-png.flaticon.com/512/2966/2966489.png">
    <div>Health Programs</div>
  </div>

  <div class="card">
    <img src="https://cdn-icons-png.flaticon.com/512/190/190411.png">
    <div>Skill Development</div>
  </div>
</div>

<!-- MOCK TEST -->
<div class="section">
  <h2>Exam Mock Test</h2>

  <input type="text" placeholder="Enter Your Name"><br><br>

  <div class="test-box">
    <div class="timer" id="timer">Time Left: 60s</div>

    <p>1. India ki capital kya hai?</p>
    <input type="radio" name="q1"> Delhi<br>
    <input type="radio" name="q1"> Mumbai<br>
    <input type="radio" name="q1"> Kolkata<br>

    <p>2. 10 ÷ 2 = ?</p>
    <input type="radio" name="q2"> 5<br>
    <input type="radio" name="q2"> 4<br>
    <input type="radio" name="q2"> 6<br>

    <br>
    <button onclick="submitTest()">Submit</button>
  </div>
</div>

<script>
function pay(){
  window.location.href="upi://pay?pa=8750752884-2@ibl&pn=Donation&cu=INR";
}

// TIMER
let time=60;
setInterval(()=>{
  if(time>0){
    time--;
    document.getElementById("timer").innerText="Time Left: "+time+"s";
  }
},1000);

function submitTest(){
  alert("Test Submitted ✅");
}
</script>

</body>
</html>
