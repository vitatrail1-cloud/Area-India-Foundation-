<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

body {margin:0;font-family:Arial;background:#f5f7fa;}

background:linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)),

.btn {background:#ff3b3b;color:white;padding:12px 25px;border-radius:30px;margin:10px;border:none;}
.section {padding:40px;text-align:center;}
.card {background:white;padding:20px;margin:10px;border-radius:10px;display:inline-block;width:260px;}
.contact {background:#0d47a1;color:white;padding:40px;}
.footer {background:black;color:white;text-align:center;padding:20px;}
.whatsapp {position:fixed;bottom:20px;left:20px;background:#25D366;padding:15px;border-radius:50%;color:white;}
</style><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body><div class="navbar">
<img src="logo.png" onerror="this.src='https://via.placeholder.com/50'">
<h2>AREA INDIA FOUNDATION</h2>
</div><div class="hero">
<h1>Support Education ❤️</h1><button onclick="donateNow()" class="btn">Donate 💰</button>
<a href="#mock" class="btn">Start Test</a>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=8750752884-2@ibl"><h3>Total Donation ₹ <span id="donationAmount">0</span></h3>
</div><!-- MOCK TEST --><div class="section" id="mock">
<h2>Mock Test</h2>
<h3>⏱ Time Left: <span id="timer">60</span></h3><div id="quiz"></div><button class="btn" onclick="submitQuiz()">Submit</button>

<h3 id="result"></h3>
<canvas id="resultChart" width="300"></canvas><h2>🏆 Leaderboard</h2>
<div id="leaderboard"></div>
</div><div class="contact">
<p>📞 8796577598</p>
<p>📧 areaindiafoundation@gmail.com</p>
<p>UPI: 8750752884-2@ibl</p>
</div><a href="https://wa.me/918796577598" class="whatsapp">💬</a>

<div class="footer">© 2025 AREA INDIA FOUNDATION</div><script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyATPwympmjr2Cd---yyunvqeo4RKe5Klm4",
  authDomain: "area-india-foundation.firebaseapp.com",
  databaseURL: "https://area-india-foundation-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "area-india-foundation"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔥 LIVE DONATION UPDATE
db.ref("donations").on("value", (snapshot) => {
  document.getElementById("donationAmount").innerText = snapshot.val() || 0;
});

// 💰 DONATE BUTTON (FIREBASE)
function donateNow(){
let amt = prompt("Enter Amount ₹:");
if(amt){
db.ref("donations").once("value").then(snap=>{
let current = snap.val() || 0;
db.ref("donations").set(current + parseInt(amt));
});
}
}

// QUESTIONS
let questions = [
{q:"2+2=?",options:["3","4","5","6"],answer:"4"},
{q:"Capital of India?",options:["Delhi","Mumbai","Kolkata","Chennai"],answer:"Delhi"}
];

// LOAD QUIZ
function loadQuiz(){
let quiz=document.getElementById("quiz");
quiz.innerHTML="";
questions.forEach((q,i)=>{
let html=`<div class="card"><h3>${q.q}</h3>`;
q.options.forEach(opt=>{
html+=`<label><input type="radio" name="q${i}" value="${opt}">${opt}</label><br>`;
});
html+=`</div>`;
quiz.innerHTML+=html;
});
}

// SUBMIT + SAVE SCORE
function submitQuiz(){
let score=0;

questions.forEach((q,i)=>{
let sel=document.querySelector(`input[name=q${i}]:checked`);
if(sel && sel.value===q.answer) score++;
});

let total = questions.length;

document.getElementById("result").innerText =
`Score ${score}/${total}`;

let name=prompt("Enter name");
if(name){
db.ref("leaderboard").push({name:name,score:score});
}

showGraph(score,total);
}

// GRAPH
function showGraph(score,total){
new Chart(document.getElementById("resultChart"),{
type:'doughnut',
data:{
labels:["Correct","Wrong"],
datasets:[{data:[score,total-score]}]
}
});
}

// 🔥 LIVE LEADERBOARD
function loadLeaderboard(){
db.ref("leaderboard").on("value", snap=>{
let data=snap.val() || {};
let arr=[];

for(let id in data){
arr.push(data[id]);
}

arr.sort((a,b)=>b.score-a.score);

let html="";
arr.slice(0,10).forEach((item,index)=>{
html+=`<div class="card">
🏅 Rank ${index+1}<br>
👤 ${item.name}<br>
🎯 ${item.score}
</div>`;
});

document.getElementById("leaderboard").innerHTML=html;
});
}

// TIMER
let time=60;
setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;
if(time<=0) submitQuiz();
},1000);

// INIT
window.onload=()=>{
loadQuiz();
loadLeaderboard();
};

</script></body>
</html>
