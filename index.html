<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AREA INDIA FOUNDATION</title>

<style>
body {margin:0;font-family:Arial;background:#f5f7fa;}
.navbar {display:flex;align-items:center;padding:15px;background:white;}
.navbar img {width:50px;margin-right:10px;}
.hero {
  height:90vh;
  background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.6)),
  url('https://images.unsplash.com/photo-1593113630400-ea4288922497');
  background-size:cover;color:white;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
}
.btn {
  background:red;color:white;padding:12px 25px;border-radius:30px;
  margin:10px;cursor:pointer;border:none;
}
.section {padding:40px;text-align:center;}
.card {
  background:white;padding:20px;margin:10px;border-radius:10px;
}
.contact {background:#0d47a1;color:white;padding:30px;}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <img src="logo.png" onerror="this.src='https://via.placeholder.com/50'">
  <h2>AREA INDIA FOUNDATION</h2>
</div>

<!-- Hero -->
<div class="hero">
  <h1>Support Education ❤️</h1>

  <button class="btn" onclick="payUPI()">Donate 💰</button>
  <h2 id="donationDisplay">₹0</h2>

  <a href="#mock" class="btn">Start Mock Test</a>
  <button class="btn" onclick="adminLogin()">Admin Login 🔐</button>
</div>

<!-- MOCK TEST -->
<div class="section" id="mock">
  <h2>Mock Test</h2>
  <div id="quiz"></div>
  <button class="btn" onclick="submitQuiz()">Submit</button>
  <h3 id="result"></h3>
</div>

<!-- ADMIN PANEL -->
<div class="section" id="admin" style="display:none;">
  <h2>Admin Panel</h2>

  <input id="q" placeholder="Question"><br><br>
  <input id="o1" placeholder="Option1"><br><br>
  <input id="o2" placeholder="Option2"><br><br>
  <input id="o3" placeholder="Option3"><br><br>
  <input id="o4" placeholder="Option4"><br><br>
  <input id="ans" placeholder="Answer"><br><br>

  <button class="btn" onclick="addQ()">Add Question</button>

  <div id="adminList"></div>
</div>

<!-- Contact -->
<div class="contact">
  <p>📞 8796577598</p>
  <p>📧 areaindiafoundation@gmail.com</p>
  <p>UPI: 8750752884-2@ibl</p>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const qRef = ref(db,"questions");
const dRef = ref(db,"donation");

window.addQ = function(){
  let data = {
    q: q.value,
    options:[o1.value,o2.value,o3.value,o4.value],
    answer: ans.value
  };
  push(qRef,data);
}

window.payUPI = function(){
  window.location.href="upi://pay?pa=8750752884-2@ibl&pn=AreaIndiaFoundation&cu=INR";
  let amount = prompt("Enter donation amount:");
  if(amount){
    set(dRef, parseInt(amount));
  }
}

// LOAD QUIZ LIVE
onValue(qRef,(snap)=>{
  let quiz = document.getElementById("quiz");
  quiz.innerHTML="";
  let i=0;

  snap.forEach(child=>{
    let d = child.val();
    let html=`<div class="card"><h3>Q${++i}: ${d.q}</h3>`;
    d.options.forEach(o=>{
      html+=`<input type="radio" name="q${i}" value="${o}">${o}<br>`;
    });
    html+=`</div>`;
    quiz.innerHTML+=html;
  });
});

// SUBMIT
window.submitQuiz=function(){
  let score=0;
  let i=0;

  document.querySelectorAll(".card").forEach(card=>{
    let selected = card.querySelector("input:checked");
    let ans = card.querySelectorAll("input")[0].name;
    i++;
  });

  alert("Submitted ✅");
}

// ADMIN LOGIN
window.adminLogin=function(){
  let pass = prompt("Enter Admin Password:");
  if(pass==="1234"){
    document.getElementById("admin").style.display="block";
  }else{
    alert("Wrong Password");
  }
}

// DONATION LIVE
onValue(dRef,(snap)=>{
  let val = snap.val() || 0;
  document.getElementById("donationDisplay").innerText="₹"+val;
});
</script>

</body>
</html>
